categories:
- 模型发布
- 产品动态
- 产业商业
- 研究论文
- 实操技巧
- 观点深度
collection:
  date_window_days: 3
  db_limit: 300
  max_per_source: 5
  timeout_seconds: 30
database:
  path: data/news_radar.db
dedup:
  semantic_threshold: 0.85
llm:
  api_key: ''
  base_url: https://api.minimaxi.com/v1
  model: MiniMax-M2.7
  provider: openai
scheduler:
  cron: 0 8 * * *
  enabled: true
sources:
  proxy_probe_timeout: 5
  proxy_url: http://127.0.0.1:10809
  twitter:
    accounts:
    - display_name: OpenAI 官方
      handle: OpenAI
    - display_name: Anthropic 官方
      handle: AnthropicAI
    - display_name: Google DeepMind
      handle: GoogleDeepMind
    - display_name: Yann LeCun
      handle: ylecun
    - display_name: Andrej Karpathy
      handle: karpathy
    - display_name: 向阳乔木
      handle: vista8
    - display_name: 宝玉
      handle: dotey
    - display_name: AYi
      handle: AYi_AInotes
    - display_name: huangserva
      handle: servasyy_ai
    - display_name: berryxia
      handle: berryxia
    - display_name: 花叔
      handle: AlchainHust
    enabled: true
    fetch_delay_max: 20
    fetch_delay_min: 8
    max_total_tweets: 150
    max_tweets_per_account: 10
    tweet_delay_max: 3
    tweet_delay_min: 1
    use_proxy: true
  websites:
  - indicator: academic
    institution: OpenAI
    name: OpenAI Blog
    tier: 1
    type: rss
    url: https://openai.com/news/rss.xml
    use_proxy: true
  - indicator: academic
    institution: Anthropic
    name: Anthropic News
    selector: a[href*="/news/"]
    tier: 1
    type: scrape
    url: https://www.anthropic.com/news
    use_proxy: true
  - indicator: academic
    institution: DeepMind
    name: Google DeepMind Blog
    tier: 1
    type: rss
    url: https://deepmind.google/blog/rss.xml
    use_proxy: true
  - indicator: academic
    institution: Meta
    name: Meta AI Blog
    tier: 1
    type: rss
    url: https://engineering.fb.com/feed/
    use_proxy: true
  - indicator: academic
    institution: Google
    name: Google AI Blog
    tier: 1
    type: rss
    url: https://blog.google/technology/ai/rss/
    use_proxy: true
  - indicator: academic
    institution: arXiv
    name: arXiv cs.AI
    tier: 1
    type: rss
    url: https://rss.arxiv.org/rss/cs.AI
    use_proxy: true
  - indicator: academic
    institution: arXiv
    name: arXiv cs.CL
    tier: 1
    type: rss
    url: https://rss.arxiv.org/rss/cs.CL
